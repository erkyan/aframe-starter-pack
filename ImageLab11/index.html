<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>

      <a-assets>
        <img id="umbrellaTexture" src="umbrella.jpg">
        <img id="beachballTexture" src="beachball.jpeg">

      </a-assets>
      <!--a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box-->

      <a-sphere position="0 0.6 -5" radius="0.7" material="src: #beachballTexture"></a-sphere>
      <a-sphere position="-3 0.6 -5" radius="0.7" material="src: #beachballTexture"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.2" height="3" color="#000000"></a-cylinder>
      <a-cylinder position="-3 0.75 -3" radius="0.2" height="3" color="#000000"></a-cylinder>
      <a-cone position="1 2.5 -3" height="0.6" scale="2" material="src: #umbrellaTexture"></a-cone>
      <a-cone position="-3 2.5 -3" height="0.6" scale="2" material="src: #umbrellaTexture"></a-cone>

      <a-plane src="sandtexture.jpg" position="0 0 -4" rotation="-90 0 0" width="100" height="100"></a-plane>
      <a-sky src="beachscene.jpg"></a-sky>
    </a-scene>
  </body>
</html>
